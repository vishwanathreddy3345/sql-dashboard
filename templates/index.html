<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee SQL Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        nav {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('employees') }}">Employees</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</nav>

<div class="container">

    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <p>Total Employees</p>
            <h2>{{ total_employees }}</h2>
        </div>
        <div class="card">
            <p>Departments</p>
            <h2>{{ total_departments }}</h2>
        </div>
        <div class="card">
            <p>Avg Salary</p>
            <h2>₹ {{ avg_salary }}</h2>
        </div>
        <div class="card">
            <p>Max Salary</p>
            <h2>₹ {{ max_salary }}</h2>
        </div>
    </div>

    <div class="grid-2">
        <div class="section">
            <h3>Employees by Department</h3>
            <div class="chart-container">
                <canvas id="deptChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h3>Avg Salary by Department</h3>
            <div class="chart-container">
                <canvas id="salaryChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid-2">
        <div class="section">
            <h3>Department Distribution</h3>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h3>Salary Distribution</h3>
            <div class="chart-container">
                <canvas id="donutChart"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // ✅ SAFE DATA (fixes VS Code + runtime errors)
    const deptLabels = JSON.parse('{{ dept_labels | default([]) | tojson | safe }}');
    const deptCounts = JSON.parse('{{ dept_counts | default([]) | tojson | safe }}');
    const deptAvg = JSON.parse('{{ dept_avg_salaries | default([]) | tojson | safe }}');

    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false
    };

    // BAR
    if (document.getElementById("deptChart")) {
        new Chart(document.getElementById("deptChart"), {
            type: "bar",
            data: {
                labels: deptLabels,
                datasets: [{
                    label: "Employees",
                    data: deptCounts
                }]
            },
            options: commonOptions
        });
    }

    // LINE
    if (document.getElementById("salaryChart")) {
        new Chart(document.getElementById("salaryChart"), {
            type: "line",
            data: {
                labels: deptLabels,
                datasets: [{
                    label: "Avg Salary",
                    data: deptAvg
                }]
            },
            options: commonOptions
        });
    }

    // PIE
    if (document.getElementById("pieChart")) {
        new Chart(document.getElementById("pieChart"), {
            type: "pie",
            data: {
                labels: deptLabels,
                datasets: [{
                    data: deptCounts
                }]
            },
            options: commonOptions
        });
    }

    // DONUT
    if (document.getElementById("donutChart")) {
        new Chart(document.getElementById("donutChart"), {
            type: "doughnut",
            data: {
                labels: deptLabels,
                datasets: [{
                    data: deptAvg
                }]
            },
            options: commonOptions
        });
    }

});
</script>

</body>
</html>
